# nixpacks.toml — Railway 빌드 설정
[variables]
NIXPACKS_NODE_VERSION = "22"
NPM_CONFIG_FUND = "false"
NPM_CONFIG_UPDATE_NOTIFIER = "false"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
# npm ci는 Windows/Linux lock 파일 차이로 실패할 수 있어 install 사용
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node scripts/start.mjs"
