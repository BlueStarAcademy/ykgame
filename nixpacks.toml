# nixpacks.toml — Railway 빌드 설정
[variables]
NIXPACKS_NODE_VERSION = "22"
NPM_CONFIG_FUND = "false"
NPM_CONFIG_UPDATE_NOTIFIER = "false"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
# npm ci는 Windows/Linux lock 파일 차이로 실패할 수 있어 install 사용
cmds = ["npm install"]

[phases.build]
# Railway 빌드 단계에는 Postgres가 없으므로 placeholder URL 사용
cmds = [
  "npm run assets:generate",
  "DATABASE_URL=postgresql://build:build@127.0.0.1:5432/build npm run build",
]

[start]
cmd = "node scripts/start.mjs"
