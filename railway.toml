[build]
builder = "nixpacks"
buildCommand = "DATABASE_URL=postgresql://build:build@127.0.0.1:5432/build npm run build"
watchPatterns = ["src/**", "prisma/**", "public/**"]

[deploy]
preDeployCommand = "sh scripts/railway-predeploy.sh"
startCommand = "node scripts/start.mjs"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
