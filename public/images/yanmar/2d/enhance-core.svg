<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="ec-bezel" x1="12" y1="8" x2="52" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="42%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ec-gem" x1="20" y1="14" x2="46" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="28%" stop-color="#22d3ee"/>
      <stop offset="62%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="ec-facet" x1="24" y1="18" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#a5f3fc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ec-glow" cx="32" cy="30" r="18" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="ec-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <!-- soft aura -->
  <circle cx="32" cy="32" r="22" fill="url(#ec-glow)" filter="url(#ec-soft)"/>

  <!-- outer hexagonal metal bezel -->
  <path
    fill="url(#ec-bezel)"
    stroke="#0f172a"
    stroke-width="1.4"
    stroke-linejoin="round"
    d="M32 6.5 52.5 18.2v23.6L32 57.5 11.5 41.8V18.2L32 6.5z"
  />

  <!-- inner bevel shadow -->
  <path
    fill="#0f172a"
    fill-opacity="0.35"
    d="M32 11.2 47.8 20.2v19.6L32 48.8 16.2 39.8V20.2L32 11.2z"
  />

  <!-- crystal hex body -->
  <path
    fill="url(#ec-gem)"
    stroke="#083344"
    stroke-width="1.1"
    stroke-linejoin="round"
    d="M32 13.5 46.2 21.5v17L32 46.5 17.8 38.5v-17L32 13.5z"
  />

  <!-- crystal facet ridges -->
  <path
    stroke="#ecfeff"
    stroke-opacity="0.35"
    stroke-width="0.9"
    stroke-linecap="round"
    d="M32 13.5v33M17.8 21.5 46.2 38.5M46.2 21.5 17.8 38.5"
  />

  <!-- top facet highlight -->
  <path
    fill="url(#ec-facet)"
    d="M32 13.5 46.2 21.5 32 26.2 17.8 21.5 32 13.5z"
  />

  <!-- core nucleus -->
  <circle cx="32" cy="31.5" r="5.2" fill="#0ea5e9" fill-opacity="0.35"/>
  <circle cx="32" cy="31.5" r="3.6" fill="#cffafe" stroke="#0891b2" stroke-width="0.8"/>
  <circle cx="30.8" cy="30.2" r="1.15" fill="#ffffff" fill-opacity="0.9"/>

  <!-- micro rivets on bezel -->
  <circle cx="32" cy="9.6" r="1.05" fill="#cbd5e1" stroke="#334155" stroke-width="0.45"/>
  <circle cx="49.4" cy="19.4" r="1.05" fill="#cbd5e1" stroke="#334155" stroke-width="0.45"/>
  <circle cx="49.4" cy="40.6" r="1.05" fill="#94a3b8" stroke="#334155" stroke-width="0.45"/>
  <circle cx="32" cy="50.4" r="1.05" fill="#64748b" stroke="#334155" stroke-width="0.45"/>
  <circle cx="14.6" cy="40.6" r="1.05" fill="#94a3b8" stroke="#334155" stroke-width="0.45"/>
  <circle cx="14.6" cy="19.4" r="1.05" fill="#cbd5e1" stroke="#334155" stroke-width="0.45"/>
</svg>
